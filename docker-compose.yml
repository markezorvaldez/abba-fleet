services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: abbafleet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: ./src/api
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=db;Database=abbafleet;Username=postgres;Password=postgres"
    volumes:
      - ./src/api:/app
    depends_on:
      - db

  web:
    build: ./src/web
    ports:
      - "5173:5173"
    volumes:
      - ./src/web:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
