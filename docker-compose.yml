services:
  app:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    working_dir: /app
    volumes:
      - ./src/app:/app
      - app_obj:/app/obj
      - app_bin:/app/bin
      - app_uploads:/data/uploads
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      FileStorage__BasePath: /data/uploads
    command: dotnet watch run --urls http://+:8080 --no-launch-profile
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: abbafleet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  app_obj:
  app_bin:
  app_uploads:
